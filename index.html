<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ORIMUS BORDER SOC</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#05102B">

  <!-- iOS-specific -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ORIMUS SOC">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <meta name="format-detection" content="telephone=no">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #05102B;
      min-height: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    #root { min-height: 100vh; }
    button { -webkit-appearance: none; appearance: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0A1838; }
    ::-webkit-scrollbar-thumb { background: #1F61FC; }
    ::-webkit-scrollbar-thumb:hover { background: #60C7F4; }

    #preload {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: #05102B;
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      color: #6A7B95;
      font-size: 11px;
      letter-spacing: 2px;
      z-index: 9999;
      transition: opacity 0.3s;
      text-align: center;
      padding: 20px;
    }
    #preload.hidden { opacity: 0; pointer-events: none; }
    #preload img { width: 72px; height: 72px; margin-bottom: 20px; opacity: 0.9; }
    #preload .bar {
      width: 160px; height: 2px; background: rgba(96, 199, 244, 0.15); margin-top: 14px; overflow: hidden; position: relative;
    }
    #preload .bar::after {
      content: ''; position: absolute; top: 0; left: -40%; height: 100%; width: 40%;
      background: linear-gradient(90deg, transparent, #60C7F4, transparent);
      animation: scan 1.2s infinite linear;
    }
    @keyframes scan { to { left: 100%; } }

    #preload .status {
      margin-top: 18px;
      font-size: 9px;
      color: #3D4E6B;
      letter-spacing: 1.5px;
      max-width: 280px;
      line-height: 1.6;
    }
    #preload .err {
      color: #E5484D; margin-top: 14px; font-size: 10px; max-width: 320px;
    }
    #preload .err pre {
      background: #0A1838;
      padding: 8px;
      margin-top: 6px;
      font-size: 9px;
      text-align: left;
      overflow: auto;
      max-height: 140px;
      border: 1px solid rgba(229, 72, 77, 0.3);
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div id="preload">
    <img src="icon-192.png" alt="">
    <div>ORIMUS // BORDER SOC v0.9</div>
    <div class="bar"></div>
    <div class="status" id="preload-status">INITIALIZING...</div>
    <div class="err" id="preload-err" style="display:none;"></div>
  </div>
  <div id="root"></div>

  <script>
    // Expose global error reporter BEFORE loading React, so if anything blows up we can see it
    (function () {
      const statusEl = document.getElementById('preload-status');
      const errEl = document.getElementById('preload-err');
      window.__orimusStatus = function (msg) {
        if (statusEl) statusEl.textContent = msg;
      };
      window.__orimusError = function (label, err) {
        if (errEl) {
          errEl.style.display = 'block';
          const msg = err && (err.stack || err.message) ? (err.stack || err.message) : String(err);
          errEl.innerHTML = '<strong>' + label + '</strong><pre>' + msg.replace(/</g, '&lt;') + '</pre>';
        }
      };
      window.addEventListener('error', (e) => {
        window.__orimusError('RUNTIME ERROR', e.error || e.message);
      });
      window.addEventListener('unhandledrejection', (e) => {
        window.__orimusError('PROMISE REJECTION', e.reason);
      });
    })();

    // Proactively warm the cache BEFORE dynamically loading React.
    // This ensures the service worker has everything stored on first Safari load,
    // so the subsequent standalone (home-screen) launch finds files in cache.
    (function () {
      window.__orimusStatus('WARMING CACHE...');
      const assets = [
        'react.min.js',
        'react-dom.min.js',
        'app.compiled.js',
        'manifest.webmanifest',
        'icon-32.png',
        'icon-180.png',
        'icon-192.png',
        'icon-512.png'
      ];
      Promise.all(assets.map((a) =>
        fetch(a, { cache: 'reload' }).catch((e) => {
          console.warn('[warm] Failed', a, e);
          return null;
        })
      )).then(() => {
        window.__orimusStatus('LOADING RUNTIME...');
        // Now load React + ReactDOM + app sequentially
        return loadScript('react.min.js')
          .then(() => loadScript('react-dom.min.js'))
          .then(() => {
            window.__orimusStatus('LOADING CONSOLE...');
            return loadScript('app.compiled.js');
          });
      }).catch((e) => {
        window.__orimusError('BOOT FAILED', e);
      });

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error('Failed to load ' + src));
          document.body.appendChild(s);
        });
      }
    })();

    // Hide preload once React has mounted
    (function () {
      const pre = document.getElementById('preload');
      const check = () => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          pre.classList.add('hidden');
          setTimeout(() => pre.remove(), 300);
        } else {
          setTimeout(check, 100);
        }
      };
      setTimeout(check, 300);
    })();

    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js', { scope: '/orimus-soc/' })
          .then((reg) => {
            console.log('[SW] Registered, scope:', reg.scope);
          })
          .catch((e) => {
            console.warn('[SW] Register failed:', e);
            // Don't show to user - SW is optional for first load
          });
      });
    }
  </script>
</body>
</html>
